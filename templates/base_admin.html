<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "PPPoE Manager" }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#0d9488",
            accent: "#134e4a",
            surface: "#f0fdfa"
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head %}{% endblock %}
</head>
<body class="min-h-screen flex flex-col bg-surface font-sans text-slate-800 antialiased">
  {% include "partials/header.html" %}
  <main class="flex-1 pb-10">
    {% block content %}{% endblock %}
  </main>
  {% include "partials/footer.html" %}

  <div id="adminLoading" class="fixed inset-0 z-[60] hidden items-start justify-center bg-black/25 backdrop-blur-[1px]">
    <div class="relative mt-24 w-[min(92vw,420px)] overflow-hidden rounded-2xl border border-slate-200 bg-white p-4 shadow-2xl">
      <div class="admin-pace-track">
        <div class="admin-pace-bar"></div>
      </div>
      <div class="mt-2 flex items-center gap-3 text-sm font-semibold text-slate-700">
        <span class="inline-block h-4 w-4 animate-spin rounded-full border-2 border-slate-300 border-t-teal-600"></span>
        <span id="adminLoadingText">Memproses...</span>
      </div>
    </div>
  </div>

  <div id="toast" class="fixed bottom-24 left-1/2 z-50 -translate-x-1/2 transform rounded-lg bg-gray-800 px-4 py-2 text-sm text-white opacity-0 transition duration-300">Info</div>
  <div id="netStatus" class="fixed bottom-12 left-1/2 z-50 -translate-x-1/2 transform rounded-lg bg-gray-700 px-4 py-2 text-sm text-white opacity-0 transition duration-300">Offline</div>

  <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
